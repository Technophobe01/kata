            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
    get:
      operationId: showProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
