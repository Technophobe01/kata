info:
  title: kata
  version: 0.2.0
openapi: 3.1.0
paths:
  /api/v1/audit/closes:
    get:
      operationId: auditCloses
      parameters:
        - explode: false
          in: query
          name: project_id
          required: true
          schema:
            format: int64
            type: integer
        - description: "RFC3339 timestamp (default: zero time)"
          explode: false
          in: query
          name: since
          schema:
            description: "RFC3339 timestamp (default: zero time)"
            type: string
        - description: "RFC3339 timestamp (default: now)"
          explode: false
          in: query
          name: until
          schema:
            description: "RFC3339 timestamp (default: now)"
            type: string
        - explode: false
          in: query
          name: actor
          schema:
            type: string
        - description: filter to closes of children of parent <ref>
          explode: false
          in: query
          name: parent
          schema:
            description: filter to closes of children of parent <ref>
            type: string
        - explode: false
          in: query
          name: reason
          schema:
            type: string
        - explode: false
          in: query
          name: no_evidence
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditClosesResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/digest:
    get:
      operationId: digestGlobal
      parameters:
        - explode: false
          in: query
          name: since
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: until
          schema:
            type: string
        - explode: true
          in: query
          name: actor
          schema:
            items:
              type: string
            type:
              - array
              - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/events:
    get:
      operationId: pollEvents
      parameters:
        - explode: false
          in: query
          name: after_id
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollEventsBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/events/stream:
    get:
      description: Streams durable events as Server-Sent Events. Clients may resume with Last-Event-ID or after_id, but not both.
      operationId: streamEvents
      parameters:
        - description: Exclusive event cursor. Mutually exclusive with Last-Event-ID.
          in: query
          name: after_id
          schema:
            format: int64
            type: integer
        - description: Optional project ID filter. Omit to stream all visible project events.
          in: query
          name: project_id
          schema:
            format: int64
            type: integer
        - description: Exclusive resume cursor from the last received SSE id. Mutually exclusive with after_id.
          in: header
          name: Last-Event-ID
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                description: UTF-8 Server-Sent Events frames containing event envelopes or sync.reset_required reset payloads.
                type: string
          description: Server-Sent Events stream.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      summary: Stream events
  /api/v1/federation/enrollments:
    get:
      operationId: listFederationEnrollments
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFederationEnrollmentsBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
    post:
      operationId: createFederationEnrollment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFederationEnrollmentRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationEnrollmentOut"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/federation/enrollments/{enrollment_id}/revoke:
    post:
      operationId: revokeFederationEnrollment
      parameters:
        - in: path
          name: enrollment_id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeFederationEnrollmentBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/federation/replicas:
    post:
      operationId: createFederationReplica
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFederationReplicaRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFederationReplicaBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/federation/replicas/{project_id}/actions/leave:
    post:
      operationId: leaveFederationReplica
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            format: int64
            type: integer
        - in: header
          name: X-Kata-Confirm
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveFederationReplicaRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveFederationReplicaResultBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/federation/status:
    get:
      operationId: getFederationStatus
      parameters:
        - explode: false
          in: query
          name: include
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationStatusBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/health:
    get:
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/instance:
    get:
      operationId: instance
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/issues:
    get:
      operationId: listAllIssues
      parameters:
        - explode: false
          in: query
          name: project_id
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: status
          schema:
            enum:
              - open
              - closed
              - ""
            type: string
        - description: exact priority filter (0..4); empty = no filter
          explode: false
          in: query
          name: priority
          schema:
            description: exact priority filter (0..4); empty = no filter
            type: string
        - description: include only priority <= this value (0..4); empty = no filter
          explode: false
          in: query
          name: max_priority
          schema:
            description: include only priority <= this value (0..4); empty = no filter
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIssuesResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/issues/{uid}:
    get:
      operationId: showIssueByUID
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: include_deleted
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowIssueResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/ping:
    get:
      operationId: ping
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
  /api/v1/projects:
    get:
      operationId: listProjects
      parameters:
        - explode: false
          in: query
          name: include
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProjectsResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
    post:
      operationId: initProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitProjectRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitProjectResponseBody"
          description: OK
        default:
