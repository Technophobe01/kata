  /api/v1/projects/{project_id}:
    delete:
      operationId: removeProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: actor
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: force
          schema:
            type: boolean
      responses:
