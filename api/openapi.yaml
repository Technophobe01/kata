components:
  schemas:
    ActionRequestBody:
      additionalProperties: false
      properties:
        actor:
          type: string
        dry_run:
          type: boolean
        evidence:
          items:
            $ref: "#/components/schemas/Evidence"
          type:
            - array
            - "null"
        message:
          type: string
        reason:
          enum:
            - done
            - wontfix
            - duplicate
            - superseded
            - audit-no-change
            - ""
          type: string
        source:
          enum:
            - tui
            - ""
          type: string
      required:
        - actor
      type: object
