name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        env:
          KATA_TEST_POSTGRES_AUTO_CONTAINER: "0"
        run: env -u KATA_AUTH_TOKEN go test -p 1 ./...

  postgres:
    name: PostgreSQL ${{ matrix.postgres }} conformance
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [pg17, pg18]

    services:
      postgres:
        image: pgvector/pgvector:${{ matrix.postgres }}
        env:
          POSTGRES_DB: kata_test
          POSTGRES_USER: kata
          POSTGRES_PASSWORD: kata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kata -d kata_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run PostgreSQL backend and operator tests
        env:
          KATA_TEST_POSTGRES_DSN: postgres://kata:kata@127.0.0.1:5432/kata_test?sslmode=disable
        run: >-
          env -u KATA_AUTH_TOKEN go test -count=1 -p 1
          ./internal/testenv
          ./internal/db/pgstore
          ./internal/db/storeopen
          ./internal/daemon
          ./internal/jsonl
          ./internal/vector
          ./cmd/kata
          ./e2e

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        shell: bash
        env:
          KATA_TEST_FAST_SQLITE: "1"
        run: env -u KATA_AUTH_TOKEN go test -p 4 -vet=off ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.12.2
          args: --config .golangci.yml

  release-scripts:
    name: Release script tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Run release script tests
        run: env -u KATA_AUTH_TOKEN make release-scripts-test

  nilaway:
    name: nilaway
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260515015210-fd187751154f

      - name: Run nilaway
        run: make nilaway

  federation-stress:
    name: Federation stress tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run federation stress tests
        run: env -u KATA_AUTH_TOKEN make test-stress

  federation-docker:
    name: Federation Docker tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run federation Docker tests
        run: env -u KATA_AUTH_TOKEN make test-federation-docker
