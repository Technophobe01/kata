name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.5.0.
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and verify release tag
        id: validate
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          scripts/verify-release-tag.sh "$INPUT_TAG"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ steps.validate.outputs.tag_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Re-verify release tag before publish
        env:
          TAG_NAME: ${{ steps.validate.outputs.tag_name }}
          TAG_SHA: ${{ steps.validate.outputs.tag_sha }}
        run: |
          git fetch --force --tags origin \
            "+refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" \
            '+refs/heads/main:refs/remotes/origin/main'

          current_sha="$(git rev-parse -q --verify "${TAG_NAME}^{commit}")"
          if [[ "$current_sha" != "$TAG_SHA" ]]; then
            printf 'Release tag %s moved from %s to %s before publish\n' \
              "$TAG_NAME" "$TAG_SHA" "$current_sha" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            printf 'Release tag %s commit %s is not contained in origin/main\n' \
              "$TAG_NAME" "$TAG_SHA" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.validate.outputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-from-tag

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
